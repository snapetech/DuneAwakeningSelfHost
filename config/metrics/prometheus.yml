global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [prometheus:9090]
  - job_name: node
    static_configs:
      - targets: [node-exporter:9100]
  - job_name: cadvisor
    scrape_interval: 10s
    static_configs:
      - targets: [cadvisor:8080]
  - job_name: postgres
    static_configs:
      - targets: [postgres-exporter:9187]
  - job_name: dash-slo
    metrics_path: /metrics/slo
    static_configs:
      - targets: [admin-panel:8080]
  - job_name: dash-capacity
    metrics_path: /metrics/capacity
    static_configs:
      - targets: [admin-panel:8080]
  - job_name: dash-desired-state
    metrics_path: /metrics/desired-state
    static_configs:
      - targets: [admin-panel:8080]
  - job_name: dash-change-intelligence
    metrics_path: /metrics/change-intelligence
    static_configs:
      - targets: [admin-panel:8080]
  - job_name: rabbitmq-admin
    static_configs:
      - targets: [admin-rmq:15692]
  - job_name: rabbitmq-game
    static_configs:
      - targets: [game-rmq:15692]
