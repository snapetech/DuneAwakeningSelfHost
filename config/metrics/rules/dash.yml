groups:
  - name: dash-host
    rules:
      - alert: DashHostHighCpu
        expr: 100 * (1 - avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m]))) > 85
        for: 10m
        labels: {severity: warning}
        annotations: {summary: "DASH host CPU is above 85%"}
      - alert: DashHostHighMemory
        expr: 100 * (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) > 90
        for: 10m
        labels: {severity: warning}
        annotations: {summary: "DASH host memory is above 90%"}
      - alert: DashHostLowAvailableMemory
        expr: node_memory_MemAvailable_bytes < 2147483648
        for: 5m
        labels: {severity: critical}
        annotations: {summary: "DASH host has less than 2 GiB available"}
      - alert: DashHostFilesystemCritical
        expr: 100 * (1 - node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"}) > 95
        for: 5m
        labels: {severity: critical}
        annotations: {summary: "DASH host filesystem is above 95%"}
  - name: dash-datastores
    rules:
      - alert: DashPostgresDown
        expr: pg_up == 0
        for: 1m
        labels: {severity: critical}
        annotations: {summary: "DASH Postgres exporter reports down"}
      - alert: DashPostgresDeadlocks
        expr: increase(pg_stat_database_deadlocks{datname="dune_sb_1_4_0_0"}[5m]) > 0
        for: 1m
        labels: {severity: warning}
        annotations: {summary: "DASH Postgres deadlocks increased"}
      - alert: DashRabbitMQDown
        expr: rabbitmq_up == 0
        for: 1m
        labels: {severity: critical}
        annotations: {summary: "A DASH RabbitMQ broker reports down"}
      - alert: DashRabbitMQQueueBacklog
        expr: rabbitmq_queue_messages_ready > 1000
        for: 10m
        labels: {severity: warning}
        annotations: {summary: "A DASH RabbitMQ queue has a sustained backlog"}
  - name: dash-containers
    rules:
      - alert: DashContainerHighMemory
        expr: 100 * container_memory_working_set_bytes{name=~"dune_server-.*"} / container_spec_memory_limit_bytes{name=~"dune_server-.*"} > 90 and container_spec_memory_limit_bytes{name=~"dune_server-.*"} > 0
        for: 10m
        labels: {severity: warning}
        annotations: {summary: "A DASH container is above 90% of its memory limit"}
      - alert: DashContainerMemoryFailures
        expr: increase(container_memory_failcnt{name=~"dune_server-.*"}[10m]) > 0
        for: 1m
        labels: {severity: warning}
        annotations: {summary: "A DASH container memory failure counter increased"}
  - name: dash-reliability-slo
    rules:
      - alert: DashSloCollectorStale
        expr: time() - dash_slo_last_snapshot_timestamp_seconds > 180
        for: 2m
        labels: {severity: critical}
        annotations: {summary: "DASH reliability sampling is stale"}
      - alert: DashSloCriticalIncident
        expr: dash_slo_open_incidents{severity="critical"} > 0
        for: 1m
        labels: {severity: critical}
        annotations: {summary: "A critical DASH SLO incident is open"}
      - alert: DashSloFastBurn
        expr: dash_slo_error_budget_burn_rate{window_seconds="3600"} > 14.4 and dash_slo_observation_coverage_ratio{window_seconds="3600"} > 0.25
        for: 5m
        labels: {severity: critical}
        annotations: {summary: "A DASH objective is consuming error budget at a fast-burn rate"}
      - alert: DashSloBudgetExhausted
        expr: dash_slo_error_budget_remaining_ratio{window_seconds="2592000"} <= 0 and dash_slo_observation_coverage_ratio{window_seconds="2592000"} > 0.1
        for: 15m
        labels: {severity: warning}
        annotations: {summary: "A DASH 30-day SLO error budget is exhausted"}
  - name: dash-capacity-intelligence
    rules:
      - alert: DashCapacityCollectorStale
        expr: time() - dash_capacity_last_sample_timestamp_seconds > 120
        for: 2m
        labels: {severity: warning}
        annotations: {summary: "DASH capacity intelligence sampling is stale"}
      - alert: DashCapacityColdStartSlow
        expr: dash_capacity_cold_start_p95_seconds > 180
        for: 15m
        labels: {severity: warning}
        annotations: {summary: "A dynamic map cold-start p95 exceeds three minutes"}
