groups:
  - name: dash-host
    rules:
      - alert: DashHostHighCpu
        expr: 100 * (1 - avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m]))) > 85
        for: 10m
        labels: {severity: warning}
        annotations: {summary: "DASH host CPU is above 85%"}
      - alert: DashHostHighMemory
        expr: 100 * (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) > 90
        for: 10m
        labels: {severity: warning}
        annotations: {summary: "DASH host memory is above 90%"}
      - alert: DashHostLowAvailableMemory
        expr: node_memory_MemAvailable_bytes < 2147483648
        for: 5m
        labels: {severity: critical}
        annotations: {summary: "DASH host has less than 2 GiB available"}
      - alert: DashHostFilesystemCritical
        expr: 100 * (1 - node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"}) > 95
        for: 5m
        labels: {severity: critical}
        annotations: {summary: "DASH host filesystem is above 95%"}
  - name: dash-datastores
    rules:
      - alert: DashPostgresDown
        expr: pg_up == 0
        for: 1m
        labels: {severity: critical}
        annotations: {summary: "DASH Postgres exporter reports down"}
      - alert: DashPostgresDeadlocks
        expr: increase(pg_stat_database_deadlocks{datname="dune_sb_1_4_0_0"}[5m]) > 0
        for: 1m
        labels: {severity: warning}
        annotations: {summary: "DASH Postgres deadlocks increased"}
      - alert: DashRabbitMQDown
        expr: rabbitmq_up == 0
        for: 1m
        labels: {severity: critical}
        annotations: {summary: "A DASH RabbitMQ broker reports down"}
      - alert: DashRabbitMQQueueBacklog
        expr: rabbitmq_queue_messages_ready > 1000
        for: 10m
        labels: {severity: warning}
        annotations: {summary: "A DASH RabbitMQ queue has a sustained backlog"}
  - name: dash-containers
    rules:
      - alert: DashContainerHighMemory
        expr: 100 * container_memory_working_set_bytes{name=~"dune_server-.*"} / container_spec_memory_limit_bytes{name=~"dune_server-.*"} > 90 and container_spec_memory_limit_bytes{name=~"dune_server-.*"} > 0
        for: 10m
        labels: {severity: warning}
        annotations: {summary: "A DASH container is above 90% of its memory limit"}
      - alert: DashContainerMemoryFailures
        expr: increase(container_memory_failcnt{name=~"dune_server-.*"}[10m]) > 0
        for: 1m
        labels: {severity: warning}
        annotations: {summary: "A DASH container memory failure counter increased"}
  - name: dash-reliability-slo
    rules:
      - alert: DashSloCollectorStale
        expr: time() - dash_slo_last_snapshot_timestamp_seconds > 180
        for: 2m
        labels: {severity: critical}
        annotations: {summary: "DASH reliability sampling is stale"}
      - alert: DashSloCriticalIncident
        expr: dash_slo_open_incidents{severity="critical"} > 0
        for: 1m
        labels: {severity: critical}
        annotations: {summary: "A critical DASH SLO incident is open"}
      - alert: DashSloFastBurn
        expr: dash_slo_error_budget_burn_rate{window_seconds="3600"} > 14.4 and dash_slo_observation_coverage_ratio{window_seconds="3600"} > 0.25
        for: 5m
        labels: {severity: critical}
        annotations: {summary: "A DASH objective is consuming error budget at a fast-burn rate"}
      - alert: DashSloBudgetExhausted
        expr: dash_slo_error_budget_remaining_ratio{window_seconds="2592000"} <= 0 and dash_slo_observation_coverage_ratio{window_seconds="2592000"} > 0.1
        for: 15m
        labels: {severity: warning}
        annotations: {summary: "A DASH 30-day SLO error budget is exhausted"}
  - name: dash-capacity-intelligence
    rules:
      - alert: DashCapacityCollectorStale
        expr: time() - dash_capacity_last_sample_timestamp_seconds > 120
        for: 2m
        labels: {severity: warning}
        annotations: {summary: "DASH capacity intelligence sampling is stale"}
      - alert: DashCapacityColdStartSlow
        expr: dash_capacity_cold_start_p95_seconds > 180
        for: 15m
        labels: {severity: warning}
        annotations: {summary: "A dynamic map cold-start p95 exceeds three minutes"}
  - name: dash-desired-state
    rules:
      - alert: DashDesiredStateCollectorDown
        expr: up{job="dash-desired-state"} == 0
        for: 2m
        labels: {severity: critical}
        annotations: {summary: "DASH desired-state collector is unreachable"}
      - alert: DashDesiredStateIntegrityInvalid
        expr: dash_desired_state_collector_up == 0
        for: 2m
        labels: {severity: critical}
        annotations: {summary: "DASH desired-state SQLite, HMAC, trigger, or event-chain verification failed"}
      - alert: DashDesiredStateUnsealed
        expr: dash_desired_state_sealed == 0
        for: 15m
        labels: {severity: critical}
        annotations: {summary: "DASH has no approved desired-state baseline"}
      - alert: DashDesiredStateCollectorStale
        expr: time() - dash_desired_state_last_observation_timestamp_seconds > 180
        for: 2m
        labels: {severity: critical}
        annotations: {summary: "DASH desired-state attestation is stale"}
      - alert: DashDesiredStateCriticalDrift
        expr: dash_desired_state_alertable_critical_drift > 0
        for: 2m
        labels: {severity: critical}
        annotations: {summary: "Critical DASH source, configuration, or container drift is active"}
  - name: dash-change-intelligence
    rules:
      - alert: DashChangeIntelligenceCollectorDown
        expr: up{job="dash-change-intelligence"} == 0
        for: 2m
        labels: {severity: critical}
        annotations: {summary: "DASH change-intelligence collector is unreachable"}
      - alert: DashChangeIntelligenceIntegrityInvalid
        expr: dash_change_intelligence_collector_up == 0
        for: 2m
        labels: {severity: critical}
        annotations: {summary: "DASH operational change HMAC chain or append-only enforcement failed"}
      - alert: DashIncidentHasCandidateChange
        expr: dash_change_intelligence_open_incidents_with_candidate_changes > 0
        for: 2m
        labels: {severity: warning}
        annotations: {summary: "An open DASH incident has temporally correlated preceding changes to review"}
      - alert: DashIncidentResponseDrillNotReady
        expr: dash_incident_response_last_drill_timestamp_seconds > 0 and dash_incident_response_latest_drill_ready == 0
        for: 2m
        labels: {severity: warning}
        annotations: {summary: "The latest DASH incident-response readiness drill found diagnostic or recovery-contract gaps"}
      - alert: DashIncidentResponseDrillStale
        expr: time() - dash_incident_response_last_drill_timestamp_seconds > 604800
        for: 1h
        labels: {severity: warning}
        annotations: {summary: "No successful or failed DASH incident-response readiness drill has been recorded in seven days"}
      - alert: DashIncidentReadinessNotCertified
        expr: dash_incident_readiness_certification_ready == 0
        for: 15m
        labels: {severity: warning}
        annotations: {summary: "DASH incident-response policy has no current passing fleet-wide readiness certification"}
      - alert: DashIncidentReadinessCertificationStale
        expr: time() - dash_incident_readiness_last_certification_timestamp_seconds > 604800
        for: 1h
        labels: {severity: warning}
        annotations: {summary: "DASH fleet-wide incident-readiness certification is older than seven days"}
      - alert: DashDeploymentAssuranceCollectorInvalid
        expr: dash_deployment_assurance_collector_up == 0
        for: 2m
        labels: {severity: critical}
        annotations: {summary: "DASH deployment-assurance window or signed receipt verification failed"}
      - alert: DashDeploymentAssuranceNotReady
        expr: dash_deployment_assurance_latest_ready == 0
        for: 15m
        labels: {severity: warning}
        annotations: {summary: "DASH has no passing assured deployment receipt or the latest change window failed"}
      - alert: DashDeploymentAssuranceStale
        expr: time() - dash_deployment_assurance_last_completion_timestamp_seconds > 604800
        for: 1h
        labels: {severity: warning}
        annotations: {summary: "DASH has not completed an assured deployment in seven days"}
      - alert: DashDeploymentAssuranceWindowOverdue
        expr: dash_deployment_assurance_overdue_windows > 0
        for: 2m
        labels: {severity: critical}
        annotations: {summary: "A DASH assured change window expired without a completion or cancellation receipt"}
