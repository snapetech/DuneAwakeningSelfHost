Sandworm.SandwormDangerZonesEnabled=true
Vehicle.SandwormInvulnerabilitySecondsOnExit=900.0
Vehicle.SandwormInvulnerabilitySecondsOnServerRestart=7200.0

; Test: disable the dedicated vehicle long-distance proxy path on DD#1.
; Current binary registers Vehicle.LongDistanceProxiesRange at 200000 cm
; (2000m) and hard-gates proxy entries below 300m. With the existing
; MaxNetCullDistanceSquared=400.0e8 experiment above, this separates "real
; actor can replicate farther" from "client only sees the proxy actor".
Vehicle.LongDistanceProxiesEnabled=0
