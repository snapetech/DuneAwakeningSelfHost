[URL]
Port=7777
IGWPort=7888

[ConsoleVariables]
; Public server name. The Compose stack also passes WORLD_NAME into Director/Text Router/Gateway.
;Bgd.ServerDisplayName="My Arrakis, My Dune"

; Do not store the real password in this tracked file. scripts/run_server_safe.sh injects
; DUNE_SERVER_LOGIN_PASSWORD from .env into Engine.ini and UserEngine.ini at launch.
;Bgd.ServerLoginPassword="Sandworm"

Dune.GlobalMiningOutputMultiplier=1.2
Dune.GlobalVehicleMiningOutputMultiplier=1.2
SecurityZones.PvpResourceMultiplier=2.5
dw.VehicleDurabilityDamageMultiplier=1.0
Sandstorm.Enabled=1
Sandstorm.Treasure.Enabled=1
sandworm.dune.Enabled=1
Vehicle.SandwormCollisionInteraction=false
Sandworm.SandwormDangerZonesEnabled=true
Vehicle.SandwormInvulnerabilitySecondsOnExit=900.0
Vehicle.SandwormInvulnerabilitySecondsOnServerRestart=7200.0
