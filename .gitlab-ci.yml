stages:
  - validate
  - package
  - deploy
  - observe

# Optional operator CI for GitLab/home-lab installs.
# DASH does not require GitLab for normal install or maintenance. Deploy jobs are
# manual by design; scheduled jobs should stay read-only.

variables:
  PUBLIC_SITE_PACKAGE: "dist/dash-public-site.tar.gz"
  PUBLIC_SITE_ENV_FILE: "/etc/dune-public-site.env"
  PUBLIC_SITE_URL: "https://dune.snape.tech"
  DUNE_ENV_FILE: ".env"

validate:public-site:
  stage: validate
  script:
    - make public-site-check
    - public-site/scripts/package-dune-public-site.sh "$PUBLIC_SITE_PACKAGE"
  artifacts:
    expire_in: 7 days
    paths:
      - "$PUBLIC_SITE_PACKAGE"

validate:admin-panel:
  stage: validate
  script:
    - python3 -m py_compile admin/admin_panel.py scripts/admin-chat-commands.py scripts/player-presence-announcer.py scripts/dune_gm_command.py scripts/probe-gm-command.py scripts/gm-command-catalog.py
    - python3 scripts/test-admin-panel-safe-surfaces.py
    - python3 scripts/test-admin-chat-commands.py

deploy:public-site:
  stage: deploy
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
    - when: never
  script:
    - public-site/scripts/deploy-dune-public-site.sh "$PUBLIC_SITE_ENV_FILE"

deploy:admin-panel:
  stage: deploy
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
    - when: never
  script:
    - scripts/deploy-admin-panel.sh "$DUNE_ENV_FILE"

observe:public-site:
  stage: observe
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - when: manual
  script:
    - public-site/scripts/verify-dune-public-site.sh "$PUBLIC_SITE_URL"

observe:admin-panel:
  stage: observe
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - when: manual
  script:
    - ./scripts/check-admin-ingress.sh "$DUNE_ENV_FILE"

observe:server-health:
  stage: observe
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - when: manual
  script:
    - ./scripts/status.sh "$DUNE_ENV_FILE"
    - ./scripts/rmq-health.sh "$DUNE_ENV_FILE"
