x-ue4ss-building-piece-limit: &ue4ss-building-piece-limit
  environment:
    DUNE_ENABLE_LINUX_SERVER_PRELOAD: "true"
    DUNE_LINUX_SERVER_PRELOAD: ${DUNE_LINUX_SERVER_PRELOAD:-/workspace/build/linux-server-loader/libdune_server_probe_loader.so}
    DUNE_PROBE_LOADER_LUA_LIBRARY: ${DUNE_PROBE_LOADER_LUA_LIBRARY:-/usr/lib/x86_64-linux-gnu/liblua5.4.so.0}
    DUNE_PROBE_LOADER_LOG: ${DUNE_PROBE_LOADER_LOG:-/tmp/dune-ue4ss-building-piece-limit.log}
    DUNE_PROBE_LOADER_FORCE: "true"
    DUNE_PROBE_LOADER_SNAPSHOT_DELAY_SECONDS: ${DUNE_PROBE_LOADER_SNAPSHOT_DELAY_SECONDS:-20}
    DUNE_PROBE_LOADER_LUA_MODS_ENABLED: "true"
    DUNE_PROBE_LOADER_LUA_MOD_ROOT: /workspace/tools/ue4ss-mods
    DUNE_PROBE_LOADER_UE_OBJECT_ARRAY_PROBE: "true"
    DUNE_PROBE_LOADER_UE_OBJECT_ARRAY_CLASS_REFLECTION_PROBE: "true"
    DUNE_PROBE_LOADER_UE_REFLECTION_PROBE: "true"
    DUNE_PROBE_LOADER_UE_REFLECTION_FIELD_WALK: "true"
    DUNE_PROBE_LOADER_UE_REFLECTION_PROPERTY_PROBE: "true"
    DUNE_PROBE_LOADER_UE_REFLECTION_VALUE_PROBE: "true"
    DUNE_PROBE_LOADER_LUA_REFLECTION_RAW_SET_ENABLED: ${DUNE_PROBE_LOADER_LUA_REFLECTION_RAW_SET_ENABLED:-false}
    DUNE_BUILDING_PIECE_LIMIT: ${DUNE_BUILDING_PIECE_LIMIT:-7500}
    DUNE_BUILDING_PIECE_LIMIT_UE4SS_APPLY: ${DUNE_BUILDING_PIECE_LIMIT_UE4SS_APPLY:-false}

services:
  survival: *ue4ss-building-piece-limit
