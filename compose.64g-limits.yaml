# Resource guardrails for a 64 GiB class host.
#
# These limits do not reduce the game's true working set. They prevent one map
# from consuming the whole host and make OOM behavior less random under pressure.

x-core-tiny: &core-tiny
  mem_limit: 512m
  mem_reservation: 128m
  cpus: 1.0
  oom_score_adj: -500

x-core-small: &core-small
  mem_limit: 2g
  mem_reservation: 512m
  cpus: 2.0
  oom_score_adj: -700

x-map-small: &map-small
  mem_limit: 3g
  mem_reservation: 768m
  cpus: 1.5
  oom_score_adj: 300

x-map-medium: &map-medium
  mem_limit: 5g
  mem_reservation: 1g
  cpus: 2.0
  oom_score_adj: 250

x-map-large: &map-large
  mem_limit: 10g
  mem_reservation: 2g
  cpus: 3.0
  oom_score_adj: 200

x-map-entry: &map-entry
  mem_limit: 16g
  mem_reservation: 4g
  cpus: 4.0
  oom_score_adj: 100

services:
  postgres:
    <<: *core-small

  admin-rmq:
    <<: *core-small

  game-rmq:
    <<: *core-small

  rmq-auth-shim:
    <<: *core-tiny

  director:
    <<: *core-tiny

  text-router:
    <<: *core-tiny

  gateway:
    <<: *core-tiny

  survival:
    <<: *map-entry

  overmap:
    <<: *map-medium
    oom_score_adj: 100

  deep-desert:
    <<: *map-large

  deep-desert-pvp:
    <<: *map-large

  arrakeen:
    <<: *map-medium

  harko-village:
    <<: *map-medium

  testing-hephaestus:
