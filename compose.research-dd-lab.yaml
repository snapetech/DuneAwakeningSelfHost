services:
  deep-desert-lab-pve:
    image: registry.funcom.com/funcom/self-hosting/seabass-server:${DUNE_IMAGE_TAG}
    command:
      - /workspace/scripts/run_server_safe.sh
      - -FarmRegion=${WORLD_REGION}
      - -ini:engine:[FuncomLiveServices]:ServiceAuthToken=${FLS_SECRET}
      - -ini:engine:[FuncomLiveServices]:DefaultFlsEnvironment=${DUNE_FLS_ENV:-retail}
      - -ini:engine:[OnlineSubsystem]:ServerName=${WORLD_UNIQUE_NAME}
      - -ini:engine:[ConsoleVariables]:Bgd.ServerLoginPassword=${DUNE_SERVER_LOGIN_PASSWORD:-}
      - -ini:engine:[OnlineSubsystem]:DatacenterId=${WORLD_REGION}
      - -ini:game:[DuneDatabaseInterfacePSQL]:DatabaseHost=postgres:5432
      - -ini:game:[DuneDatabaseInterfacePSQL]:DatabaseUser=dune
      - -ini:game:[DuneDatabaseInterfacePSQL]:DatabasePassword=${POSTGRES_DUNE_PASSWORD}
      - -RMQGameTlsEnabled=true
      - -ExternalAddress=${EXTERNAL_ADDRESS}
      - --RMQGameHostname=game-rmq
      - --RMQGamePort=5672
      - --RMQAdminHostname=admin-rmq
      - --RMQAdminPort=5672
      - -MultiHome=$$POD_IP
      - /Game/Dune/Maps/Arrakis/DeepDesert_1/DeepDesert_1.DeepDesert_1
      - -Port=7784
      - -IGWPort=7895
      - -PartitionIndex=8
    environment:
      POD_IP: 172.31.241.18
      NODE_NAME: dune-handoff-lab
      BATTLEGROUP_DISPLAY_NAME: ${WORLD_UNIQUE_NAME}
      WORLD_NAME: ${WORLD_NAME}
      DUNE_SERVER_LOGIN_PASSWORD: ${DUNE_SERVER_LOGIN_PASSWORD:-}
      DUNE_SERVER_DISPLAY_NAME: ${DUNE_SERVER_DISPLAY_NAME:-}
      DUNE_FORCE_PRIVATE_IGW_BIND_ADDRESS: ${DUNE_FORCE_PRIVATE_IGW_BIND_ADDRESS:-false}
    ports:
      - "${HANDOFF_LAB_DD_PVE_UDP_PORT:-17784}:7784/udp"
      - "${HANDOFF_LAB_DD_PVE_IGW_UDP_PORT:-18895}:7895/udp"
    volumes:
      - .:/workspace:ro
      - ./config/research-dd-lab/pve/UserGame.ini:/workspace/config/UserGame.ini:ro
      - ./data/handoff-lab/server-saved/deep-desert-pve:/home/dune/server/DuneSandbox/Saved
    networks:
      default:
        ipv4_address: 172.31.241.18

  deep-desert-lab-pvp:
    # Non-live research fixture only. Partition 31 is the PVE Hardcore Deep Desert shape.
    profiles: ["disabled-deep-desert-pvp-lab"]
    image: registry.funcom.com/funcom/self-hosting/seabass-server:${DUNE_IMAGE_TAG}
    command:
      - /workspace/scripts/run_server_safe.sh
      - -FarmRegion=${WORLD_REGION}
      - -ini:engine:[FuncomLiveServices]:ServiceAuthToken=${FLS_SECRET}
      - -ini:engine:[FuncomLiveServices]:DefaultFlsEnvironment=${DUNE_FLS_ENV:-retail}
      - -ini:engine:[OnlineSubsystem]:ServerName=${WORLD_UNIQUE_NAME}
      - -ini:engine:[ConsoleVariables]:Bgd.ServerLoginPassword=${DUNE_SERVER_LOGIN_PASSWORD:-}
      - -ini:engine:[OnlineSubsystem]:DatacenterId=${WORLD_REGION}
      - -ini:game:[DuneDatabaseInterfacePSQL]:DatabaseHost=postgres:5432
      - -ini:game:[DuneDatabaseInterfacePSQL]:DatabaseUser=dune
      - -ini:game:[DuneDatabaseInterfacePSQL]:DatabasePassword=${POSTGRES_DUNE_PASSWORD}
      - -RMQGameTlsEnabled=true
      - -ExternalAddress=${EXTERNAL_ADDRESS}
      - --RMQGameHostname=game-rmq
      - --RMQGamePort=5672
      - --RMQAdminHostname=admin-rmq
      - --RMQAdminPort=5672
      - -MultiHome=$$POD_IP
      - /Game/Dune/Maps/Arrakis/DeepDesert_1/DeepDesert_1.DeepDesert_1
      - -Port=7807
      - -IGWPort=7918
      - -PartitionIndex=31
    environment:
      POD_IP: 172.31.241.31
      NODE_NAME: dune-handoff-lab
      BATTLEGROUP_DISPLAY_NAME: ${WORLD_UNIQUE_NAME}
      WORLD_NAME: ${WORLD_NAME}
      DUNE_SERVER_LOGIN_PASSWORD: ${DUNE_SERVER_LOGIN_PASSWORD:-}
      DUNE_SERVER_DISPLAY_NAME: ${DUNE_SERVER_DISPLAY_NAME:-}
      DUNE_FORCE_PRIVATE_IGW_BIND_ADDRESS: ${DUNE_FORCE_PRIVATE_IGW_BIND_ADDRESS:-false}
      DUNE_USERENGINE_CONFIG_PATH: /workspace/config/UserEngine.deep-desert-pvp.ini
    ports:
      - "${HANDOFF_LAB_DD_PVP_UDP_PORT:-17807}:7807/udp"
      - "${HANDOFF_LAB_DD_PVP_IGW_UDP_PORT:-18918}:7918/udp"
    volumes:
      - .:/workspace:ro
      - ./config/research-dd-lab/pvp/UserGame.ini:/workspace/config/UserGame.ini:ro
      - ./data/handoff-lab/server-saved/deep-desert-pvp:/home/dune/server/DuneSandbox/Saved
    networks:
      default:
        ipv4_address: 172.31.241.31
