services:
  postgres-replica:
    image: registry.funcom.com/funcom/self-hosting/igw-postgres:17.4-alpine-fc-13
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGDATA: /var/lib/postgresql/data
      POSTGRES_REPLICATION_USER: ${POSTGRES_REPLICATION_USER:-dune_replicator}
      POSTGRES_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD:?set POSTGRES_REPLICATION_PASSWORD in .env}
      POSTGRES_REPLICATION_SLOT: ${POSTGRES_REPLICATION_SLOT:-dune_standby}
      POSTGRES_PRIMARY_HOST: ${POSTGRES_PRIMARY_HOST:-postgres}
      POSTGRES_PRIMARY_PORT: ${POSTGRES_PRIMARY_PORT:-5432}
    volumes:
      - ./vendor/bin/rg:/usr/local/bin/rg:ro
      - ./vendor/bin/busybox:/usr/local/bin/busybox:ro
      - ./vendor/bin/jq:/usr/local/bin/jq:ro
      - ./vendor/bin/curl:/usr/local/bin/curl:ro
      - ./data/postgres-replica:/var/lib/postgresql/data
      - ./scripts/postgres-replica-entrypoint.sh:/workspace/scripts/postgres-replica-entrypoint.sh:ro
    command: ["/workspace/scripts/postgres-replica-entrypoint.sh"]
    ports:
      - "127.0.0.1:${POSTGRES_REPLICA_HOST_PORT:-15433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dune -d dune_sb_1_4_0_0 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
