server {
	listen 443 ssl http2;
	server_name games.example.com;

	add_header Content-Security-Policy "default-src 'none'; base-uri 'none'; frame-ancestors 'none'; form-action 'none'; style-src 'self'; script-src 'self'; connect-src 'self'; img-src 'self' data:" always;
	add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=(), serial=(), bluetooth=(), browsing-topics=()" always;
	add_header Referrer-Policy "no-referrer" always;
	add_header X-Content-Type-Options "nosniff" always;
	add_header X-Frame-Options "DENY" always;
	add_header Cache-Control "no-store, max-age=0, must-revalidate, no-transform" always;

	if ($request_method !~ ^(GET|HEAD)$) {
		return 404;
	}

	location = /dune { return 308 /dune/; }
	location = /duneawakening { return 308 /duneawakening/; }
	location = /da { return 308 /da/; }

	location ~ ^/(dune|duneawakening|da)/?$ {
		alias /srv/dash-public-site/index.html;
	}

	location ~ ^/(dune|duneawakening|da)/([^/]+\.(html|css|js|json|svg|webp))$ {
		alias /srv/dash-public-site/$2;
	}

	location = / {
		alias /srv/game-landing/index.html;
	}

	location ~ ^/(landing\.css|landing-generated\.css)$ {
		alias /srv/game-landing/$1;
	}

	location ~ ^/assets/([A-Za-z0-9_-]+\.(svg|webp|png|jpg|jpeg))$ {
		alias /srv/game-landing/assets/$1;
	}

	location / {
		return 404;
	}
}
