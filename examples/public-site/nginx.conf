server {
	listen 443 ssl http2;
	server_name dune.example.com;

	root /srv/dash-public-site;
	index index.html;

	add_header Content-Security-Policy "default-src 'none'; base-uri 'none'; frame-ancestors 'none'; form-action 'none'; style-src 'self'; script-src 'self'; connect-src 'self'; img-src 'self'" always;
	add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=(), serial=(), bluetooth=()" always;
	add_header Referrer-Policy "no-referrer" always;
	add_header X-Content-Type-Options "nosniff" always;
	add_header X-Frame-Options "DENY" always;

	if ($request_method !~ ^(GET|HEAD)$) {
		return 404;
	}

	location = / {
		try_files /index.html =404;
	}

	location ~ ^/(style\.css|app\.js|status\.html|players\.json|hagga-map\.svg|hagga-basin\.webp)$ {
		try_files $uri =404;
	}

	location / {
		return 404;
	}
}
