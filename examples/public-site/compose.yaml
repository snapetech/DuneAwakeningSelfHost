services:
  dune-public-caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
      - /run:rw,noexec,nosuid,nodev,size=16m
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    volumes:
      - ../../vendor/bin/rg:/usr/local/bin/rg:ro
      - ../../vendor/bin/busybox:/usr/local/bin/busybox:ro
      - ../../vendor/bin/jq:/usr/local/bin/jq:ro
      - ../../vendor/bin/curl:/usr/local/bin/curl:ro
      - ./dune-public-caddy.Caddyfile:/etc/caddy/Caddyfile:ro
      - /srv/dash-public-site:/srv/dash-public-site:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  caddy-data:
  caddy-config:
