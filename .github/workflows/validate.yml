name: Validate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install validation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep python3-psycopg2
          sudo install -m 0755 public-site/scripts/render-dune-static-status.sh /usr/local/sbin/render-dune-static-status.sh

      - name: Validate repository
        run: make validate

      - name: Block runtime artifacts
        run: |
          test ! -e .env
          ! git ls-files data | grep -v '^data/exchange-price-snapshots/'
          test ! -e config/tls
