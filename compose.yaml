    mac_address: 02:42:ac:1f:f0:28
    dns:
      - 1.1.1.1
      - 8.8.8.8
    command:
      - sh
      - -lc
      - >-
        sleep 30;
        exec python -m service
        -c /Tools/Battlegroups/GatewayService/service/configs/service.conf
        --RMQGameHostname ${GAME_RMQ_PUBLIC_HOST:-${EXTERNAL_ADDRESS}}
        --RMQGamePort ${GAME_RMQ_PUBLIC_PORT:-31982}
    environment:
      DuneDatabaseInterfacePSQL_DatabaseHost: postgres
      DuneDatabaseInterfacePSQL_DatabasePort: "5432"
      DuneDatabaseInterfacePSQL_DatabaseUser: dune
      DuneDatabaseInterfacePSQL_DatabasePassword: ${POSTGRES_DUNE_PASSWORD}
      DuneDatabaseInterfacePSQL_DatabaseName: dune_sb_1_4_0_0
      FuncomLiveServices__ServiceAuthToken: ${FLS_SECRET}
      FuncomLiveServices__RmqTlsEnabled: "true"
      FuncomLiveServices__BattlegroupAuthorizationPreset: BattlegroupInternal
      BATTLEGROUP_DISPLAY_NAME: ${WORLD_NAME}
      OPT_SERVERNAME: ${WORLD_UNIQUE_NAME}
      OPT_DISPLAY_NAME: ${WORLD_NAME}
      gateway_farm_api_key: ${FLS_SECRET}
      RMQ_HTTP_TOKEN_AUTH_SECRET: ${RMQ_HTTP_TOKEN_AUTH_SECRET}
      HOST_DATACENTER_ID: dune-testing
      HOST_DATACENTER_IP_ADDRESS: ${EXTERNAL_ADDRESS}
    volumes:
      - ./config/gateway.ini:/etc/app/conf.d/gateway.ini:ro
    depends_on:
