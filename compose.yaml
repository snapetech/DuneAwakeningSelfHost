      - *cmd-rmq-game-port
      - *cmd-rmq-admin-host
      - *cmd-rmq-admin-port
      - *cmd-multihome
      - -PartitionIndex=1
    environment:
      POD_IP: 172.31.240.10
      NODE_NAME: dune-local
      BATTLEGROUP_DISPLAY_NAME: ${WORLD_UNIQUE_NAME}
    ports:
      - "7777:7777/udp"
      - "7888:7888/udp"
    volumes:
      - .:/workspace:ro
      - ./data/server-saved:/home/dune/server/DuneSandbox/Saved
    networks:
      default:
        ipv4_address: 172.31.240.10

  overmap:
