  DUNE_PROBE_LOADER_LOG: ${DUNE_PROBE_LOADER_LOG:-/tmp/dune-server-probe-loader.log}
  DUNE_PROBE_LOADER_TARGET: ${DUNE_PROBE_LOADER_TARGET:-}
  DUNE_PROBE_LOADER_FORCE: ${DUNE_PROBE_LOADER_FORCE:-false}
  DUNE_PROBE_LOADER_SNAPSHOT_DELAY_SECONDS: ${DUNE_PROBE_LOADER_SNAPSHOT_DELAY_SECONDS:-0}
  DUNE_PROBE_LOADER_UE_DELAYED_PROBE_SECONDS: ${DUNE_PROBE_LOADER_UE_DELAYED_PROBE_SECONDS:-0}
  DUNE_PROBE_LOADER_UE_FNAME_DIAGNOSTICS: ${DUNE_PROBE_LOADER_UE_FNAME_DIAGNOSTICS:-false}
  DUNE_PROBE_LOADER_UE_FNAME_DIAGNOSTICS_MAX: ${DUNE_PROBE_LOADER_UE_FNAME_DIAGNOSTICS_MAX:-16}
  DUNE_PROBE_LOADER_SCAN_ENABLED: ${DUNE_PROBE_LOADER_SCAN_ENABLED:-false}
  DUNE_PROBE_LOADER_SCAN_PRESETS: ${DUNE_PROBE_LOADER_SCAN_PRESETS:-}
  DUNE_PROBE_LOADER_SCAN_STRINGS: ${DUNE_PROBE_LOADER_SCAN_STRINGS:-}
  DUNE_PROBE_LOADER_SCAN_SIGNATURES: ${DUNE_PROBE_LOADER_SCAN_SIGNATURES:-}
  DUNE_PROBE_LOADER_SCAN_PATH_FILTER: ${DUNE_PROBE_LOADER_SCAN_PATH_FILTER:-}
  DUNE_PROBE_LOADER_SCAN_LOG_MAPPINGS: ${DUNE_PROBE_LOADER_SCAN_LOG_MAPPINGS:-false}
  DUNE_PROBE_LOADER_SCAN_MAX_HITS_PER_NEEDLE: ${DUNE_PROBE_LOADER_SCAN_MAX_HITS_PER_NEEDLE:-16}
  DUNE_PROBE_LOADER_SCAN_MAX_MAPPING_BYTES: ${DUNE_PROBE_LOADER_SCAN_MAX_MAPPING_BYTES:-536870912}
  DUNE_PROBE_LOADER_UE_AUTO_DISCOVER_ROOTS: ${DUNE_PROBE_LOADER_UE_AUTO_DISCOVER_ROOTS:-false}
  DUNE_PROBE_LOADER_UE_AUTO_DISCOVER_INCLUDE_ANONYMOUS_RW: ${DUNE_PROBE_LOADER_UE_AUTO_DISCOVER_INCLUDE_ANONYMOUS_RW:-false}
  DUNE_PROBE_LOADER_UE_AUTO_DISCOVER_INCLUDE_PRIVATE_RW: ${DUNE_PROBE_LOADER_UE_AUTO_DISCOVER_INCLUDE_PRIVATE_RW:-false}
  DUNE_PROBE_LOADER_UE_AUTO_DISCOVER_MAX_MAPPING_BYTES: ${DUNE_PROBE_LOADER_UE_AUTO_DISCOVER_MAX_MAPPING_BYTES:-268435456}
  DUNE_PROBE_LOADER_UE_AUTO_DISCOVER_MAX_CANDIDATES: ${DUNE_PROBE_LOADER_UE_AUTO_DISCOVER_MAX_CANDIDATES:-8}
  DUNE_PROBE_LOADER_UE_AUTO_DISCOVER_MIN_OBJECT_ARRAY_ELEMENTS: ${DUNE_PROBE_LOADER_UE_AUTO_DISCOVER_MIN_OBJECT_ARRAY_ELEMENTS:-1}
  DUNE_PROBE_LOADER_UE_AUTO_DISCOVER_MAX_REJECTED_FNAME_SAMPLES: ${DUNE_PROBE_LOADER_UE_AUTO_DISCOVER_MAX_REJECTED_FNAME_SAMPLES:-0}

x-game-server-env: &game-server-env
  DUNE_SERVER_LOGIN_PASSWORD: ${DUNE_SERVER_LOGIN_PASSWORD:-}
  DUNE_SERVER_DISPLAY_NAME: ${DUNE_SERVER_DISPLAY_NAME:-}
  DUNE_SERVER_STARTUP_EXECCMDS: ${DUNE_SERVER_STARTUP_EXECCMDS:-}
  DUNE_FORCE_PRIVATE_IGW_BIND_ADDRESS: ${DUNE_FORCE_PRIVATE_IGW_BIND_ADDRESS:-false}
  DUNE_IGW_BIND_ADDRESS: ${DUNE_IGW_BIND_ADDRESS:-}
  DUNE_DISABLE_MULTIHOME: ${DUNE_DISABLE_MULTIHOME:-false}
  DUNE_BUILDING_PIECE_LIMIT_PATCH_ENABLED: ${DUNE_BUILDING_PIECE_LIMIT_PATCH_ENABLED:-false}
  DUNE_BUILDING_PIECE_LIMIT: ${DUNE_BUILDING_PIECE_LIMIT:-10000}
  DUNE_LANDSRAAD_VENDOR_FACTION_GATE_PATCH_ENABLED: ${DUNE_LANDSRAAD_VENDOR_FACTION_GATE_PATCH_ENABLED:-false}
  DUNE_SUBFIEF_CAP_BINARY_PATCH_ENABLED: ${DUNE_SUBFIEF_CAP_BINARY_PATCH_ENABLED:-false}
  DUNE_SUBFIEF_CAP_BINARY_TARGET: ${DUNE_SUBFIEF_CAP_BINARY_TARGET:-subfief}
  DUNE_SUBFIEF_CAP: ${DUNE_SUBFIEF_CAP:-6}
  DUNE_BRT_DD_INVALID_MAP_BINARY_PATCH_ENABLED: ${DUNE_BRT_DD_INVALID_MAP_BINARY_PATCH_ENABLED:-false}
  DUNE_BRT_DD_ACTION_GATE_BINARY_PATCH_ENABLED: ${DUNE_BRT_DD_ACTION_GATE_BINARY_PATCH_ENABLED:-false}
  DUNE_BRT_DD_BUILDABLE_MAP_REGION_PATCH_ENABLED: ${DUNE_BRT_DD_BUILDABLE_MAP_REGION_PATCH_ENABLED:-false}
  DUNE_BRT_DD_TOOL_ENABLE_BINARY_PATCH_ENABLED: ${DUNE_BRT_DD_TOOL_ENABLE_BINARY_PATCH_ENABLED:-false}
  DUNE_OODLE_LIBRARY: ${DUNE_OODLE_LIBRARY:-/tmp/oodle/liboodle-data-shared.so}

x-game-server-base: &game-server-base
  image: registry.funcom.com/funcom/self-hosting/seabass-server:${DUNE_IMAGE_TAG}
  dns:
    - 1.1.1.1
    - 8.8.8.8
  environment:
    <<: [*game-server-env, *game-server-preload-env]
    WORLD_NAME: ${WORLD_NAME}
  depends_on:
    - postgres
    - admin-rmq
    - game-rmq

x-rg-bin-volume: &rg-bin-volume ./vendor/bin/rg:/usr/local/bin/rg:ro
x-busybox-bin-volume: &busybox-bin-volume ./vendor/bin/busybox:/usr/local/bin/busybox:ro
x-jq-bin-volume: &jq-bin-volume ./vendor/bin/jq:/usr/local/bin/jq:ro
x-curl-bin-volume: &curl-bin-volume ./vendor/bin/curl:/usr/local/bin/curl:ro

x-game-server-command:
  run: &cmd-run /workspace/scripts/run_server_safe.sh
  farm-region: &cmd-farm-region -FarmRegion=${WORLD_REGION}
  fls-token: &cmd-fls-token -ini:engine:[FuncomLiveServices]:ServiceAuthToken=${FLS_SECRET}
  fls-env: &cmd-fls-env -ini:engine:[FuncomLiveServices]:DefaultFlsEnvironment=${DUNE_FLS_ENV:-retail}
  server-command-auth-token: &cmd-server-command-auth-token -ini:engine:[FuncomLiveServices]:ServerCommandsAuthToken=${DUNE_SERVER_COMMANDS_AUTH_TOKEN:-}
  notification-system: &cmd-notification-system -ini:engine:[ConsoleVariables]:server.NotificationSystem.Enabled=${DUNE_SERVER_NOTIFICATION_SYSTEM_ENABLED:-false}
  server-name: &cmd-server-name -ini:engine:[OnlineSubsystem]:ServerName=${WORLD_UNIQUE_NAME}
  server-login-password: &cmd-server-login-password -ini:engine:[ConsoleVariables]:Bgd.ServerLoginPassword=${DUNE_SERVER_LOGIN_PASSWORD:-}
  datacenter: &cmd-datacenter -ini:engine:[OnlineSubsystem]:DatacenterId=${WORLD_DATACENTER_ID}
  db-host: &cmd-db-host -ini:game:[DuneDatabaseInterfacePSQL]:DatabaseHost=postgres:5432
  db-user: &cmd-db-user -ini:game:[DuneDatabaseInterfacePSQL]:DatabaseUser=dune
  db-password: &cmd-db-password -ini:game:[DuneDatabaseInterfacePSQL]:DatabasePassword=${POSTGRES_DUNE_PASSWORD}
  rmq-tls: &cmd-rmq-tls -RMQGameTlsEnabled=true
  external-address: &cmd-external-address -ExternalAddress=${EXTERNAL_ADDRESS}
  rmq-game-host: &cmd-rmq-game-host --RMQGameHostname=game-rmq
  rmq-game-port: &cmd-rmq-game-port --RMQGamePort=5672
  rmq-admin-host: &cmd-rmq-admin-host --RMQAdminHostname=admin-rmq
  rmq-admin-port: &cmd-rmq-admin-port --RMQAdminPort=5672
  multihome: &cmd-multihome -MultiHome=$$POD_IP

services:

  postgres:
    image: registry.funcom.com/funcom/self-hosting/igw-postgres:17.4-alpine-fc-13
    restart: unless-stopped
    mac_address: 02:42:ac:1f:f0:02
    environment:
      POSTGRES_DB: dune
      POSTGRES_USER: dune
      POSTGRES_PASSWORD: ${POSTGRES_DUNE_PASSWORD}
      POSTGRES_SUPER_PASSWORD: ${POSTGRES_SUPER_PASSWORD}
    volumes:
      - *rg-bin-volume
      - *busybox-bin-volume
      - *jq-bin-volume
      - *curl-bin-volume
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:15431:5432"
      - "${POSTGRES_BRIDGE_BIND_ADDRESS:-172.31.240.1}:${POSTGRES_BRIDGE_PUBLIC_PORT:-15432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dune -d dune || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      default:
        ipv4_address: 172.31.240.2

  admin-rmq:
    image: registry.funcom.com/funcom/self-hosting/seabass-server-rabbitmq:${DUNE_IMAGE_TAG}
    hostname: admin-rmq
    mac_address: 02:42:ac:1f:f0:03
    environment:
      RMQ_AUTH_BACKEND_1: cache
      RMQ_HTTP_TOKEN_AUTH_SECRET: ${RMQ_HTTP_TOKEN_AUTH_SECRET}
      FuncomLiveServices__RmqTlsEnabled: "false"
    volumes:
      - *rg-bin-volume
      - *busybox-bin-volume
      - *jq-bin-volume
      - *curl-bin-volume
      - ./config/rabbitmq-enabled-plugins:/etc/rabbitmq/enabled_plugins:ro
      - ./config/rabbitmq-admin.conf:/etc/rabbitmq/conf.d/99-dune.conf:ro
      - ./data/rabbitmq/admin:/var/lib/rabbitmq
    ports:
      - "127.0.0.1:15672:15672"
      - "127.0.0.1:5673:5672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      default:
        ipv4_address: 172.31.240.3

  game-rmq:
    image: registry.funcom.com/funcom/self-hosting/seabass-server-rabbitmq:${DUNE_IMAGE_TAG}
    hostname: game-rmq
    mac_address: 02:42:ac:1f:f0:04
    environment:
      RMQ_AUTH_BACKEND_1: cache
      RMQ_HTTP_TOKEN_AUTH_SECRET: ${RMQ_HTTP_TOKEN_AUTH_SECRET}
      FuncomLiveServices__RmqTlsEnabled: "true"
    volumes:
      - *rg-bin-volume
      - *busybox-bin-volume
      - *jq-bin-volume
      - *curl-bin-volume
      - ./config/rabbitmq-enabled-plugins:/etc/rabbitmq/enabled_plugins:ro
      - ./config/rabbitmq-game.conf:/etc/rabbitmq/conf.d/99-dune.conf:ro
      - ./config/tls/rabbitmq/ca.crt:/etc/rabbitmq/cacert.pem:ro
      - ./config/tls/rabbitmq/server.crt:/etc/rabbitmq/cert.pem:ro
      - ./config/tls/rabbitmq/server.key:/etc/rabbitmq/key.pem:ro
      - ./data/rabbitmq/game:/var/lib/rabbitmq
    ports:
      - "${GAME_RMQ_HTTP_BIND_ADDRESS:-127.0.0.1}:${GAME_RMQ_PUBLIC_HTTP_PORT:-15673}:15672"
      - "${GAME_RMQ_BIND_ADDRESS:-0.0.0.0}:${GAME_RMQ_PUBLIC_PORT:-31982}:5672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      default:
        ipv4_address: 172.31.240.4

  rmq-auth-shim:
    image: registry.funcom.com/funcom/self-hosting/seabass-server-db-utils:${DUNE_IMAGE_TAG}
    mac_address: 02:42:ac:1f:f0:07
    working_dir: /workspace
    environment:
      WORLD_UNIQUE_NAME: ${WORLD_UNIQUE_NAME}
      TEXT_ROUTER_AUTH_BASE: http://text-router:8080
      DUNE_RMQ_MANAGEMENT_USER: ${DUNE_ANNOUNCE_RMQ_USER:-bgd.${WORLD_UNIQUE_NAME}.duneadmin.admin}
      DUNE_RMQ_MANAGEMENT_PASSWORD: ${DUNE_ANNOUNCE_RMQ_PASSWORD:-}
    command:
      - /workspace/scripts/rmq_auth_shim.py
    volumes:
      - *rg-bin-volume
      - *busybox-bin-volume
      - *jq-bin-volume
      - *curl-bin-volume
      - .:/workspace:ro
    depends_on:
      - text-router
    networks:
      default:
        ipv4_address: 172.31.240.7

  db-init:
    image: registry.funcom.com/funcom/self-hosting/seabass-server-db-utils:${DUNE_IMAGE_TAG}
    working_dir: /root/PSQL
    mac_address: 02:42:ac:1f:f0:42
    environment:
      PYTHONPATH: /root/PSQL
      POSTGRES_DUNE_PASSWORD: ${POSTGRES_DUNE_PASSWORD}
    command:
      - /workspace/scripts/bootstrap_db.py
    volumes:
      - *rg-bin-volume
      - *busybox-bin-volume
      - *jq-bin-volume
      - *curl-bin-volume
      - .:/workspace:ro
    depends_on:
      - postgres
    networks:
      default:
        ipv4_address: 172.31.240.42

  director:
    image: registry.funcom.com/funcom/self-hosting/seabass-server-bg-director:${DUNE_IMAGE_TAG}
    mac_address: 02:42:ac:1f:f0:05
    dns:
      - 1.1.1.1
      - 8.8.8.8
    command:
      - --RMQGameHostname
      - game-rmq
      - --RMQGamePort
      - "5672"
      - --RMQAdminHostname
      - admin-rmq
      - --RMQAdminPort
      - "5672"
    environment:
      Database__address: postgres
      Database__port: "5432"
      Database__user: dune
      Database__password: ${POSTGRES_DUNE_PASSWORD}
      RMQ_HTTP_TOKEN_AUTH_SECRET: ${RMQ_HTTP_TOKEN_AUTH_SECRET}
      BATTLEGROUP_DISPLAY_NAME: ${WORLD_UNIQUE_NAME}
      WORLD_NAME: ${WORLD_NAME}
      OPT_SERVERNAME: ${WORLD_UNIQUE_NAME}
      OPT_DISPLAY_NAME: ${WORLD_NAME}
      FuncomLiveServices__ServiceAuthToken: ${FLS_SECRET}
      FuncomLiveServices__RmqTlsEnabled: "true"
      BATTLEGROUP_REGION_NAME: ${WORLD_REGION}
      HOST_DATACENTER_ID: ${WORLD_DATACENTER_ID}
      HOST_DATACENTER_IP_ADDRESS: ${EXTERNAL_ADDRESS}
      FuncomLiveServices__DefaultFlsEnvironment: ${DUNE_FLS_ENV:-retail}
    volumes:
      - *rg-bin-volume
      - *busybox-bin-volume
      - *jq-bin-volume
      - *curl-bin-volume
      - ./config/director.ini:/etc/app/conf.d/director.ini:ro
    depends_on:
      - postgres
      - admin-rmq
      - game-rmq
    networks:
      default:
        ipv4_address: 172.31.240.5

  text-router:
    image: registry.funcom.com/funcom/self-hosting/seabass-server-text-router:${DUNE_IMAGE_TAG}
    mac_address: 02:42:ac:1f:f0:06
    dns:
      - 1.1.1.1
      - 8.8.8.8
    command:
      - --RMQGameHostname
      - game-rmq
      - --RMQGamePort
      - "5672"
      - --RMQAdminHostname
      - admin-rmq
      - --RMQAdminPort
      - "5672"
    environment:
      DuneDatabaseInterfacePSQL_DatabaseHost: postgres
      DuneDatabaseInterfacePSQL_DatabasePort: "5432"
      DuneDatabaseInterfacePSQL_DatabaseUser: dune
      DuneDatabaseInterfacePSQL_DatabasePassword: ${POSTGRES_DUNE_PASSWORD}
      DuneDatabaseInterfacePSQL_DatabaseName: ${DUNE_GAME_DB_NAME:-dune_sb_1_4_0_0}
      RMQ_HTTP_TOKEN_AUTH_SECRET: ${RMQ_HTTP_TOKEN_AUTH_SECRET}
      Database__address: postgres
      Database__port: "5432"
      Database__user: dune
      Database__password: ${POSTGRES_DUNE_PASSWORD}
      BATTLEGROUP_DISPLAY_NAME: ${WORLD_UNIQUE_NAME}
      WORLD_NAME: ${WORLD_NAME}
      OPT_SERVERNAME: ${WORLD_UNIQUE_NAME}
      OPT_DISPLAY_NAME: ${WORLD_NAME}
      BATTLEGROUP_REGION_NAME: ${WORLD_REGION}
      FuncomLiveServices__ServiceAuthToken: ${FLS_SECRET}
      FuncomLiveServices__RmqTlsEnabled: "true"
      BATTLEGROUP_LANGUAGE: en-US
      HOST_DATACENTER_ID: ${WORLD_DATACENTER_ID}
      HOST_DATACENTER_IP_ADDRESS: ${EXTERNAL_ADDRESS}
      FuncomLiveServices__DefaultFlsEnvironment: ${DUNE_FLS_ENV:-retail}
    depends_on:
      - postgres
      - admin-rmq
      - game-rmq
    volumes:
      - *rg-bin-volume
      - *busybox-bin-volume
      - *jq-bin-volume
      - *curl-bin-volume
    networks:
      default:
        ipv4_address: 172.31.240.6

  gateway:
    image: registry.funcom.com/funcom/self-hosting/seabass-server-gateway:${DUNE_IMAGE_TAG}
    mac_address: 02:42:ac:1f:f0:28
    dns:
      - 1.1.1.1
      - 8.8.8.8
    command:
      - sh
      - -lc
      - >-
        sleep 30;
        exec python -m service
        -c /Tools/Battlegroups/GatewayService/service/configs/service.conf
        --RMQGameHostname ${GAME_RMQ_PUBLIC_HOST:-${EXTERNAL_ADDRESS}}
        --RMQGamePort ${GAME_RMQ_PUBLIC_PORT:-31982}
        --RMQGameHttpPort ${GAME_RMQ_PUBLIC_HTTP_PORT:-15673}
    environment:
      DuneDatabaseInterfacePSQL_DatabaseHost: postgres
      DuneDatabaseInterfacePSQL_DatabasePort: "5432"
      DuneDatabaseInterfacePSQL_DatabaseUser: dune
      DuneDatabaseInterfacePSQL_DatabasePassword: ${POSTGRES_DUNE_PASSWORD}
      DuneDatabaseInterfacePSQL_DatabaseName: ${DUNE_GAME_DB_NAME:-dune_sb_1_4_0_0}
      FuncomLiveServices__ServiceAuthToken: ${FLS_SECRET}
      FuncomLiveServices__RmqTlsEnabled: "true"
      FuncomLiveServices__BattlegroupAuthorizationPreset: BattlegroupInternal
      FuncomLiveServices__DefaultFlsEnvironment: ${DUNE_FLS_ENV:-retail}
      BATTLEGROUP_DISPLAY_NAME: ${PUBLIC_SERVER_NAME:-${WORLD_NAME}}
      OPT_SERVERNAME: ${WORLD_UNIQUE_NAME}
      OPT_DISPLAY_NAME: ${PUBLIC_SERVER_NAME:-${WORLD_NAME}}
      gateway_farm_api_key: ${FLS_SECRET}
      RMQ_HTTP_TOKEN_AUTH_SECRET: ${RMQ_HTTP_TOKEN_AUTH_SECRET}
      HOST_DATACENTER_ID: ${WORLD_DATACENTER_ID}
      HOST_DATACENTER_IP_ADDRESS: ${EXTERNAL_ADDRESS}
    volumes:
      - *rg-bin-volume
      - *busybox-bin-volume
      - *jq-bin-volume
      - *curl-bin-volume
      - ./config/gateway.ini:/etc/app/conf.d/gateway.ini:ro
    depends_on:
      - postgres
      - game-rmq
    networks:
      default:
        ipv4_address: 172.31.240.40

  survival:
    <<: *game-server-base
    command:
      - *cmd-run
      - *cmd-farm-region
      - *cmd-fls-token
      - *cmd-fls-env
      - *cmd-server-command-auth-token
      - *cmd-notification-system
      - *cmd-server-name
      - *cmd-server-login-password
      - *cmd-datacenter
      - *cmd-db-host
      - *cmd-db-user
      - *cmd-db-password
      - *cmd-rmq-tls
      - *cmd-external-address
      - *cmd-rmq-game-host
      - *cmd-rmq-game-port
      - *cmd-rmq-admin-host
      - *cmd-rmq-admin-port
      - *cmd-multihome
      - -ini:game:[/Script/DuneSandbox.BuildingSettings]:m_BaseBackupToolTimeRestrictionInSeconds=0
      - -PartitionIndex=1
    environment:
      <<: [*game-server-env, *game-server-preload-env]
      POD_IP: 172.31.240.10
      NODE_NAME: dune-node
      BATTLEGROUP_DISPLAY_NAME: ${WORLD_UNIQUE_NAME}
      WORLD_NAME: ${WORLD_NAME}
    ports:
      - "7777:7777/udp"
      - "7888:7888/udp"
    volumes:
      - .:/workspace:ro
      - ./data/server-saved:/home/dune/server/DuneSandbox/Saved
    networks:
      default:
        ipv4_address: 172.31.240.10

  overmap:
    <<: *game-server-base
    command:
      - *cmd-run
      - *cmd-farm-region
      - *cmd-fls-token
      - *cmd-fls-env
      - *cmd-server-command-auth-token
      - *cmd-notification-system
      - *cmd-server-name
      - *cmd-server-login-password
      - *cmd-datacenter
      - *cmd-db-host
      - *cmd-db-user
      - *cmd-db-password
      - *cmd-rmq-tls
      - *cmd-external-address
      - *cmd-rmq-game-host
      - *cmd-rmq-game-port
      - *cmd-rmq-admin-host
      - *cmd-rmq-admin-port
      - *cmd-multihome
      - /Game/Dune/Systems/Overmap/Overmap.Overmap
      - -Port=7778
      - -IGWPort=7889
      - -PartitionIndex=2
    environment:
      <<: [*game-server-env, *game-server-preload-env]
      POD_IP: 172.31.240.11
      NODE_NAME: dune-node
      BATTLEGROUP_DISPLAY_NAME: ${WORLD_UNIQUE_NAME}
      WORLD_NAME: ${WORLD_NAME}
    ports:
      - "7778:7778/udp"
      - "7889:7889/udp"
    volumes:
      - .:/workspace:ro
      - ./data/server-saved/overmap:/home/dune/server/DuneSandbox/Saved
    networks:
      default:
        ipv4_address: 172.31.240.11

  arrakeen:
    <<: *game-server-base
    command:
      - *cmd-run
      - *cmd-farm-region
      - *cmd-fls-token
      - *cmd-fls-env
      - *cmd-server-command-auth-token
      - *cmd-notification-system
      - *cmd-server-name
      - *cmd-server-login-password
      - *cmd-datacenter
      - *cmd-db-host
      - *cmd-db-user
      - *cmd-db-password
      - *cmd-rmq-tls
      - *cmd-external-address
      - *cmd-rmq-game-host
      - *cmd-rmq-game-port
      - *cmd-rmq-admin-host
      - *cmd-rmq-admin-port
      - *cmd-multihome
      - /Game/Dune/Maps/SocialHubs/Arrakeen/SH_Arrakeen.SH_Arrakeen
      - -Port=7779
      - -IGWPort=7890
      - -PartitionIndex=3
    environment:
      <<: [*game-server-env, *game-server-preload-env]
      POD_IP: 172.31.240.12
      NODE_NAME: dune-node
      BATTLEGROUP_DISPLAY_NAME: ${WORLD_UNIQUE_NAME}
      WORLD_NAME: ${WORLD_NAME}
    ports:
      - "7779:7779/udp"
      - "7890:7890/udp"
    volumes:
      - .:/workspace:ro
      - ./data/server-saved/arrakeen:/home/dune/server/DuneSandbox/Saved
    networks:
      default:
        ipv4_address: 172.31.240.12

  harko-village:
    <<: *game-server-base
    command:
      - *cmd-run
      - *cmd-farm-region
      - *cmd-fls-token
